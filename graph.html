                  var container = document.getElementById('mynetwork');

                  

                  // parsing and collecting nodes and edges from the python
                  nodes = new vis.DataSet([{"color": "#ff6b6b", "id": "P1", "label": "Proceso_Facturacion", "shape": "dot", "size": 35, "title": "\n        Tipo: process \u003cbr\u003e\n        Criticalidad: high\n        "}, {"color": "#ff6b6b", "id": "P2", "label": "Proceso_Reportes", "shape": "dot", "size": 35, "title": "\n        Tipo: process \u003cbr\u003e\n        Criticalidad: medium\n        "}, {"color": "#4dabf7", "id": "T1", "label": "Tabla_Clientes", "shape": "dot", "size": 30, "title": "\n        Tipo: table \u003cbr\u003e\n        Criticalidad: high\n        "}, {"color": "#4dabf7", "id": "T2", "label": "Tabla_Ventas", "shape": "dot", "size": 30, "title": "\n        Tipo: table \u003cbr\u003e\n        Criticalidad: high\n        "}, {"color": "#51cf66", "id": "C1", "label": "Campo_Email", "shape": "dot", "size": 25, "title": "\n        Tipo: column \u003cbr\u003e\n        Criticalidad: medium\n        "}, {"color": "#51cf66", "id": "C2", "label": "Campo_Importe", "shape": "dot", "size": 25, "title": "\n        Tipo: column \u003cbr\u003e\n        Criticalidad: medium\n        "}, {"color": "#fab005", "id": "R1", "label": "Regla_Email_NotNull", "shape": "dot", "size": 20, "title": "\n        Tipo: rule \u003cbr\u003e\n        Criticalidad: high\n        "}, {"color": "#fab005", "id": "R2", "label": "Regla_Importe_Positive", "shape": "dot", "size": 20, "title": "\n        Tipo: rule \u003cbr\u003e\n        Criticalidad: high\n        "}]);
